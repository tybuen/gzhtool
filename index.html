<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西瓜创客明星业务公众号 · 前期筹备工具</title>
    <style>
        :root {
            --bg: #FFFFFF;
            --text: #1a2d3d;
            --text-secondary: #5a7d9a;
            --border: #2d5a7a;
            --selected-bg: #1a3650;
            --selected-text: #FFFFFF;
            --deco-blue: #1a3650;
            --deco-light: #6b8fa8;
            --font-serif: "Times New Roman", Georgia, "Noto Serif SC", "STSong", "Songti SC", serif;
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
            --spacing-module: 32px;
            --spacing-card: 24px;
            --radius: 4px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: var(--font-sans);
            background: var(--bg);
            color: var(--text);
            min-width: 1280px;
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* ========== 页面容器 ========== */
        .page {
            display: none;
            flex-direction: column;
            min-height: 100vh;
            position: relative;
        }
        .page.active {
            display: flex;
        }

        /* ========== 顶部装饰条 (120px) ========== */
        .top-deco-bar {
            width: 100%;
            height: 120px;
            background: var(--deco-blue);
            position: relative;
            overflow: hidden;
            flex-shrink: 0;
            z-index: 1;
        }
        .top-deco-bar::before {
            content: '';
            position: absolute;
            top: 18px;
            left: 40px;
            width: 70px;
            height: 70px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            pointer-events: none;
        }
        .top-deco-bar::after {
            content: '';
            position: absolute;
            top: 28px;
            left: 50px;
            width: 50px;
            height: 50px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            pointer-events: none;
        }
        .top-deco-inner {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        .top-deco-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.5);
            pointer-events: none;
        }
        .top-deco-line.h1 {
            top: 30px;
            left: 140px;
            width: 80px;
            height: 1px;
        }
        .top-deco-line.h2 {
            top: 55px;
            left: 130px;
            width: 55px;
            height: 1px;
        }
        .top-deco-line.h3 {
            top: 42px;
            left: 200px;
            width: 40px;
            height: 1px;
            transform: rotate(-30deg);
            transform-origin: left center;
        }
        .top-deco-line.v1 {
            top: 20px;
            right: 180px;
            width: 1px;
            height: 70px;
        }
        .top-deco-line.v2 {
            top: 35px;
            right: 200px;
            width: 1px;
            height: 45px;
        }
        .top-deco-dot {
            position: absolute;
            width: 5px;
            height: 5px;
            border: 1px solid rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            pointer-events: none;
        }
        .top-deco-dot.d1 {
            top: 25px;
            right: 155px;
        }
        .top-deco-dot.d2 {
            top: 65px;
            right: 170px;
        }
        .top-deco-dot.d3 {
            top: 40px;
            left: 250px;
        }
        .top-deco-rect {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }
        .top-deco-rect.r1 {
            top: 50px;
            right: 100px;
            width: 30px;
            height: 22px;
        }
        .top-deco-rect.r2 {
            top: 30px;
            right: 80px;
            width: 16px;
            height: 16px;
        }
        .top-deco-cross {
            position: absolute;
            pointer-events: none;
        }
        .top-deco-cross::before,
        .top-deco-cross::after {
            content: '';
            position: absolute;
            background: rgba(255, 255, 255, 0.45);
        }
        .top-deco-cross.c1 {
            top: 55px;
            left: 310px;
            width: 16px;
            height: 16px;
        }
        .top-deco-cross.c1::before {
            top: 0;
            left: 7px;
            width: 1px;
            height: 16px;
        }
        .top-deco-cross.c1::after {
            top: 7px;
            left: 0;
            width: 16px;
            height: 1px;
        }
        .top-deco-cross.c2 {
            top: 22px;
            right: 250px;
            width: 12px;
            height: 12px;
        }
        .top-deco-cross.c2::before {
            top: 0;
            left: 5px;
            width: 1px;
            height: 12px;
        }
        .top-deco-cross.c2::after {
            top: 5px;
            left: 0;
            width: 12px;
            height: 1px;
        }
        .top-deco-wave {
            position: absolute;
            bottom: 20px;
            left: 30px;
            width: 200px;
            height: 30px;
            pointer-events: none;
        }
        .top-deco-wave svg {
            width: 100%;
            height: 100%;
        }
        .top-deco-wave.w2 {
            left: auto;
            right: 40px;
            bottom: 15px;
            width: 160px;
            height: 25px;
        }

        /* ========== 底部装饰条 (80px) ========== */
        .bottom-deco-bar {
            width: 100%;
            height: 80px;
            background: var(--deco-blue);
            position: relative;
            flex-shrink: 0;
            overflow: visible;
            z-index: 1;
        }
        .bottom-deco-bar .wave-edge {
            position: absolute;
            top: -18px;
            left: 0;
            width: 100%;
            height: 20px;
            pointer-events: none;
        }
        .bottom-deco-bar .wave-edge svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .bottom-deco-inner {
            position: absolute;
            top: 8px;
            left: 0;
            width: 100%;
            height: calc(100% - 8px);
            pointer-events: none;
        }
        .bottom-deco-dot {
            position: absolute;
            width: 4px;
            height: 4px;
            border: 1px solid rgba(255, 255, 255, 0.45);
            border-radius: 50%;
            pointer-events: none;
        }
        .bottom-deco-dot.bd1 {
            bottom: 20px;
            left: 60px;
        }
        .bottom-deco-dot.bd2 {
            bottom: 30px;
            left: 90px;
        }
        .bottom-deco-dot.bd3 {
            bottom: 18px;
            right: 80px;
        }
        .bottom-deco-line {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            pointer-events: none;
        }
        .bottom-deco-line.bl1 {
            bottom: 28px;
            left: 100px;
            width: 50px;
            height: 1px;
        }
        .bottom-deco-line.bl2 {
            bottom: 22px;
            right: 100px;
            width: 40px;
            height: 1px;
        }

        /* ========== 页面1：启动页 ========== */
        #page1 .hero-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        #page1 .hero-small-title {
            font-family: var(--font-serif);
            font-size: 24px;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 8px;
        }
        #page1 .hero-main-title {
            font-family: var(--font-serif);
            font-size: 42px;
            color: var(--text);
            margin-bottom: 16px;
            letter-spacing: 1px;
            line-height: 1.2;
        }
        #page1 .hero-subtitle {
            font-family: var(--font-sans);
            font-size: 18px;
            color: var(--text-secondary);
            margin-bottom: 60px;
            letter-spacing: 0.5px;
        }
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
            cursor: pointer;
            border-radius: var(--radius);
            font-family: var(--font-serif);
            font-size: 16px;
            letter-spacing: 1px;
            transition: all 0.2s ease;
            user-select: none;
            text-decoration: none;
            white-space: nowrap;
            box-sizing: border-box;
        }
        .btn:hover {
            background: var(--selected-bg);
            color: var(--selected-text);
        }
        .btn:active {
            transform: scale(0.97);
        }
        .btn-large {
            width: 220px;
            height: 52px;
            font-size: 16px;
        }
        .btn-medium {
            width: 180px;
            height: 48px;
            font-size: 15px;
        }
        .btn-small {
            width: 120px;
            height: 40px;
            font-size: 14px;
            font-family: var(--font-sans);
            letter-spacing: 0;
        }
        .btn-generate-doc {
            width: 200px;
            height: 48px;
            font-size: 14px;
            font-family: var(--font-sans);
            letter-spacing: 0.5px;
        }

        /* ========== 页面2：主控制台 ========== */
        #page2 .main-content {
            flex: 1;
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px 40px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        #page2 .page-title {
            font-family: var(--font-serif);
            font-size: 32px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 60px;
            text-align: center;
        }
        .card-row {
            display: flex;
            gap: 4%;
            width: 100%;
            justify-content: center;
            flex-wrap: nowrap;
        }
        .card {
            width: 48%;
            height: 340px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            background: var(--bg);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 0;
            transition: border-width 0.15s ease, box-shadow 0.15s ease;
            box-sizing: border-box;
            position: relative;
            overflow: hidden;
        }
        .card:hover {
            border-width: 2px;
            box-shadow: 0 2px 12px rgba(26, 54, 80, 0.08);
        }
        .card .card-divider-top {
            width: 60px;
            height: 1px;
            background: var(--border);
            margin-top: 40px;
            margin-bottom: 20px;
            flex-shrink: 0;
        }
        .card .card-title {
            font-family: var(--font-serif);
            font-size: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 12px;
            text-align: center;
        }
        .card .card-desc {
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--text-secondary);
            text-align: center;
            margin-bottom: 8px;
            line-height: 1.5;
            padding: 0 20px;
        }
        .card .card-status {
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--text);
            font-weight: 500;
            text-align: center;
            min-height: 20px;
            padding: 0 16px;
            line-height: 1.4;
        }
        .card .card-divider-bottom {
            width: 60px;
            height: 1px;
            background: var(--border);
            margin-top: auto;
            margin-bottom: 40px;
            flex-shrink: 0;
        }
        .btn-row {
            display: flex;
            gap: 20px;
            margin-top: 80px;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
        }
        .btn-row-separator {
            width: 1px;
            height: 28px;
            background: #c5d5e0;
            flex-shrink: 0;
            display: block;
        }

        /* ========== 页面3 & 页面4：导航栏 ========== */
        .nav-bar {
            width: 100%;
            height: 50px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 24px;
            background: var(--bg);
            flex-shrink: 0;
            z-index: 2;
        }
        .nav-back {
            font-family: var(--font-sans);
            font-size: 16px;
            color: var(--text);
            cursor: pointer;
            background: none;
            border: none;
            letter-spacing: 0.5px;
            transition: opacity 0.2s;
            padding: 4px 8px;
            margin-right: 24px;
        }
        .nav-back:hover {
            opacity: 0.6;
        }
        .nav-title {
            font-family: var(--font-serif);
            font-size: 20px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
            flex: 1;
            text-align: center;
            margin-right: 60px;
        }

        /* ========== 页面3：视觉风格库 ========== */
        #page3 .gallery-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px 20px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            justify-items: center;
        }
        .gallery-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: transform 0.15s ease;
        }
        .gallery-item:hover {
            transform: translateY(-3px);
        }
        .gallery-img-wrap {
            width: 260px;
            height: 260px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            background: #f5f8fa;
            position: relative;
            transition: border 0.15s ease;
            box-sizing: border-box;
        }
        .gallery-img-wrap.selected {
            border: 3px solid var(--deco-blue);
        }
        .gallery-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .gallery-img-wrap .img-fallback {
            position: absolute;
            inset: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-secondary);
            font-size: 14px;
            font-family: var(--font-sans);
            background: #fff;
            pointer-events: none;
        }
        .gallery-label {
            font-family: var(--font-sans);
            font-size: 14px;
            color: var(--text);
            margin-top: 12px;
            text-align: center;
            letter-spacing: 0.5px;
        }
        .bottom-action-bar {
            width: 100%;
            height: 60px;
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            background: var(--bg);
            flex-shrink: 0;
            z-index: 2;
        }
        .bottom-action-bar .selected-count {
            font-family: var(--font-sans);
            font-size: 16px;
            color: var(--text);
            font-weight: 500;
        }
        .bottom-action-bar .btn-group {
            display: flex;
            gap: 16px;
        }

        /* ========== 页面4：内容选型 ========== */
        #page4 .form-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 40px 20px 120px;
            max-width: 800px;
            margin: 0 auto;
            width: 100%;
        }
        .form-module {
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: var(--spacing-card);
            margin-bottom: 24px;
            background: var(--bg);
        }
        .form-module-title {
            font-family: var(--font-serif);
            font-size: 18px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .form-module-title::before {
            content: '';
            display: inline-block;
            width: 8px;
            height: 16px;
            background: var(--deco-light);
            border-radius: 1px;
            flex-shrink: 0;
        }
        .form-sub-title {
            font-family: var(--font-sans);
            font-size: 15px;
            font-weight: 600;
            color: var(--text);
            margin: 8px 0 10px 0;
            letter-spacing: 0.5px;
        }
        .tag-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-bottom: 12px;
        }
        .tag {
            display: inline-flex;
            align-items: center;
            padding: 8px 16px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-size: 14px;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
            background: var(--bg);
            color: var(--text);
            white-space: nowrap;
        }
        .tag.selected {
            background: var(--selected-bg);
            color: var(--selected-text);
            border-color: var(--selected-bg);
        }
        .tag:hover {
            opacity: 0.85;
        }
        .custom-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            transition: border-color 0.15s ease;
            box-sizing: border-box;
        }
        .custom-input:focus {
            border-color: var(--deco-blue);
            border-width: 1.5px;
        }
        .custom-textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-size: 14px;
            background: var(--bg);
            color: var(--text);
            outline: none;
            resize: vertical;
            box-sizing: border-box;
            line-height: 1.5;
        }
        .custom-textarea:focus {
            border-color: var(--deco-blue);
            border-width: 1.5px;
        }
        .custom-tag-added {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-size: 13px;
            background: #f0f4f7;
            color: var(--text);
            margin: 4px;
            white-space: nowrap;
        }
        .custom-tag-added .remove-tag {
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            line-height: 1;
            color: #8aa0b5;
            transition: color 0.15s;
        }
        .custom-tag-added .remove-tag:hover {
            color: var(--deco-blue);
        }

        /* ========== Toast提示 ========== */
        .toast {
            position: fixed;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--deco-blue);
            color: #fff;
            padding: 12px 28px;
            border-radius: var(--radius);
            font-family: var(--font-sans);
            font-size: 14px;
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            letter-spacing: 0.5px;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
        }

        /* ========== 滚动条 ========== */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #c5d5e0;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #9ab4c5;
        }

        /* ========== 响应式微调（仅桌面） ========== */
        @media (max-width: 1340px) {
            .gallery-grid {
                grid-template-columns: repeat(3, 1fr);
                gap: 18px;
            }
            .gallery-img-wrap {
                width: 220px;
                height: 220px;
            }
            #page2 .main-content {
                padding: 40px 16px 30px;
            }
            .card {
                height: 300px;
            }
        }
        @media (max-width: 1100px) {
            .gallery-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 16px;
            }
            .gallery-img-wrap {
                width: 240px;
                height: 240px;
            }
            .card-row {
                flex-direction: column;
                gap: 20px;
                align-items: center;
            }
            .card {
                width: 90%;
                height: auto;
                min-height: 240px;
            }
            .btn-row {
                gap: 14px;
            }
            .btn-generate-doc {
                width: 170px;
                font-size: 13px;
            }
            .btn-row-separator {
                display: none;
            }
        }
    </style>
</head>
<body>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- ==================== 页面1：启动页 ==================== -->
    <div class="page active" id="page1">
        <div class="top-deco-bar">
            <div class="top-deco-inner">
                <div class="top-deco-line h1"></div>
                <div class="top-deco-line h2"></div>
                <div class="top-deco-line h3"></div>
                <div class="top-deco-line v1"></div>
                <div class="top-deco-line v2"></div>
                <div class="top-deco-dot d1"></div>
                <div class="top-deco-dot d2"></div>
                <div class="top-deco-dot d3"></div>
                <div class="top-deco-rect r1"></div>
                <div class="top-deco-rect r2"></div>
                <div class="top-deco-cross c1"></div>
                <div class="top-deco-cross c2"></div>
                <div class="top-deco-wave w1">
                    <svg viewBox="0 0 200 30" xmlns="http://www.w3.org/2000/svg">
                        <path d="M0,15 Q25,2 50,15 Q75,28 100,15 Q125,2 150,15 Q175,28 200,15" fill="none" stroke="rgba(255,255,255,0.45)" stroke-width="1"/>
                        <path d="M0,22 Q30,10 60,22 Q90,34 120,22 Q150,10 180,22" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8"/>
                    </svg>
                </div>

            { id: "V-019", src: "./references/V-019.jpg", name: "风格参考-019" },
            { id: "V-020", src: "./references/V-020.jpg", name: "风格参考-020" },
        ];

        // ==================== 预设选项配置 ====================
        const presetKeywords = ['业绩突破', '逆境突围', '团队攻坚', '标杆人物', '创新突破', '用户第一', '快速迭代', '凝心聚力', '韧性生长', '智慧破局', '长期主义'];
        const presetStoryTypes = ['个人成长故事', '团队协作故事', '攻坚克难故事', '客户服务故事', '技术创新故事', '破局故事', '成长故事'];
        const presetStructures = ['开篇引言', '核心数据展示', '故事叙述', '人物专访', '团队风采', '未来展望', '业务背景介绍', '人物板块', '故事板块', '数据板块'];
        const presetDataItems = ['业绩增长率', '用户数量', '项目完成率', '团队规模', '市场份额', '团队规模变化', '转化率变化'];
        const presetNarratives = ['困境→行动→结果', '纪实客观', '热血励志', '温暖感人', '专业严谨', '轻松活泼'];
        const presetEffectsInternal = ['提升团队士气', '树立标杆人物', '增强团队凝聚力', '沉淀方法论', '新人培训素材', '统一思想认知'];
        const presetEffectsExternal = ['品牌形象宣传', '业务成果展示', '吸引优秀人才', '提升行业影响力', '增强客户信任', '传递企业文化'];

        // ==================== 全局状态 ====================
        const STORAGE_KEY = 'xigua_star_biz_prep_state_v3';
        const DEFAULT_STATE = {
            selectedVisualIds: [],
            expectedEffects: {
                internal: { selected: [], custom: [] },
                external: { selected: [], custom: [] }
            },
            keywords: { selected: [], custom: [] },
            storyTypes: { selected: [], custom: [] },
            structures: { selected: [], custom: [] },
            dataItems: { selected: [], custom: [] },
            narrative: { type: "", customText: "" },
            meetingNotes: "",
            generatedAt: ""
        };

        let appState = JSON.parse(JSON.stringify(DEFAULT_STATE));
        let tempSelectedVisualIds = [];

        // ==================== 初始化 ====================
        function initApp() {
            const saved = localStorage.getItem(STORAGE_KEY);
            if (saved) {
                try {
                    const parsed = JSON.parse(saved);
                    appState = deepMerge(DEFAULT_STATE, parsed);
                } catch (e) {
                    appState = JSON.parse(JSON.stringify(DEFAULT_STATE));
                }
            } else {
                appState = JSON.parse(JSON.stringify(DEFAULT_STATE));
            }
            tempSelectedVisualIds = [...appState.selectedVisualIds];
            updatePage2Summary();
            renderGallery();
            renderPage4Forms();
            syncPage4FromState();
            updatePage3Count();
        }

        function deepMerge(defaultObj, savedObj) {
            const result = JSON.parse(JSON.stringify(defaultObj));
            if (!savedObj || typeof savedObj !== 'object') return result;
            for (const key in result) {
                if (savedObj.hasOwnProperty(key)) {
                    if (typeof result[key] === 'object' && result[key] !== null && !Array.isArray(result[key]) &&
                        typeof savedObj[key] === 'object' && savedObj[key] !== null && !Array.isArray(savedObj[key])) {
                        result[key] = deepMerge(result[key], savedObj[key]);
                    } else {
                        result[key] = savedObj[key];
                    }
                }
            }
            return result;
        }

        function saveState() {
            appState.generatedAt = new Date().toLocaleString('zh-CN', { hour12: false });
            localStorage.setItem(STORAGE_KEY, JSON.stringify(appState));
        }

        function clearState() {
            appState = JSON.parse(JSON.stringify(DEFAULT_STATE));
            tempSelectedVisualIds = [];
            localStorage.removeItem(STORAGE_KEY);
            updatePage2Summary();
            renderGallery();
            renderPage4Forms();
            syncPage4FromState();
            updatePage3Count();
            showToast('所有选择已重置');
        }

        // ==================== 页面导航 ====================
        function navigateTo(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById(pageId);
            if (target) {
                target.classList.add('active');
                const scrollEl = target.querySelector('.gallery-scroll, .form-scroll');
                if (scrollEl) scrollEl.scrollTop = 0;
                window.scrollTo(0, 0);
            }
            if (pageId === 'page3') {
                tempSelectedVisualIds = [...appState.selectedVisualIds];
                renderGallery();
                updatePage3Count();
            }
            if (pageId === 'page4') {
                syncPage4FromState();
            }
            if (pageId === 'page2') {
                updatePage2Summary();
            }
        }

        // ==================== 页面3：视觉风格库 ====================
        function renderGallery() {
            const grid = document.getElementById('gallery-grid');
            if (!grid) return;
            grid.innerHTML = visualList.map(v => {
                const isSelected = tempSelectedVisualIds.includes(v.id);
                const wrapClass = isSelected ? 'gallery-img-wrap selected' : 'gallery-img-wrap';
                return `
                <div class="gallery-item" onclick="toggleVisualSelection('${v.id}')" data-id="${v.id}">
                    <div class="${wrapClass}">
                        <img src="${v.src}" alt="${v.name}" loading="lazy"
                             onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
                        <div class="img-fallback" style="display:none;">图片未找到</div>
                    </div>
                    <div class="gallery-label">${v.id}</div>
                </div>`;
            }).join('');
        }

        function toggleVisualSelection(id) {
            const idx = tempSelectedVisualIds.indexOf(id);
            if (idx >= 0) {
                tempSelectedVisualIds.splice(idx, 1);
            } else {
                if (tempSelectedVisualIds.length >= 2) {
                    showToast('最多只能选择2张参考图');
                    return;
                }
                tempSelectedVisualIds.push(id);
            }
            updatePage3Count();
            document.querySelectorAll('.gallery-item').forEach(item => {
                const itemId = item.getAttribute('data-id');
                const wrap = item.querySelector('.gallery-img-wrap');
                if (wrap) {
                    if (tempSelectedVisualIds.includes(itemId)) {
                        wrap.classList.add('selected');
                    } else {
                        wrap.classList.remove('selected');
                    }
                }
            });
        }

            renderTags('tag-container-keywords', presetKeywords, 'keywords-tag', true);

            renderTags('tag-container-structures', presetStructures, 'structures-tag', true);
            renderTags('tag-container-dataitems', presetDataItems, 'dataitems-tag', true);
            renderTags('tag-container-narrative', presetNarratives, 'narrative-tag', false);

        function renderTags(containerId, items, dataPrefix, multiSelect) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.innerHTML = items.map(item => {
                return `<span class="tag ${dataPrefix}" data-value="${item}" data-multi="${multiSelect ? '1' : '0'}">${item}</span>`;
            }).join('');
        }

        function syncPage4FromState() {
            syncTagSelections('tag-container-effects-internal', appState.expectedEffects.internal.selected);
            syncTagSelections('tag-container-effects-external', appState.expectedEffects.external.selected);
            syncTagSelections('tag-container-keywords', appState.keywords.selected);
            syncTagSelections('tag-container-storytypes', appState.storyTypes.selected);
            syncTagSelections('tag-container-structures', appState.structures.selected);
            syncTagSelections('tag-container-dataitems', appState.dataItems.selected);
            syncTagSelections('tag-container-narrative', appState.narrative.type ? [appState.narrative.type] : []);
            renderCustomTags('custom-effects-internal-display', appState.expectedEffects.internal.custom, 'expectedEffects.internal');
            renderCustomTags('custom-effects-external-display', appState.expectedEffects.external.custom, 'expectedEffects.external');
            renderCustomTags('custom-keywords-display', appState.keywords.custom, 'keywords');
            renderCustomTags('custom-storytypes-display', appState.storyTypes.custom, 'storyTypes');
            renderCustomTags('custom-structures-display', appState.structures.custom, 'structures');
            renderCustomTags('custom-dataitems-display', appState.dataItems.custom, 'dataItems');
            document.getElementById('input-narrative').value = appState.narrative.customText || '';
            document.getElementById('textarea-notes').value = appState.meetingNotes || '';
            ['input-effects-internal', 'input-effects-external', 'input-keywords', 'input-storytypes', 'input-structures', 'input-dataitems'].forEach(id => {
                const el = document.getElementById(id);
                if (el) el.value = '';
            });
        }

        function syncTagSelections(containerId, selectedArr) {
            const container = document.getElementById(containerId);
            if (!container) return;
            container.querySelectorAll('.tag').forEach(tag => {
                const val = tag.getAttribute('data-value');
                if (selectedArr.includes(val)) {
                    tag.classList.add('selected');
                } else {
                    tag.classList.remove('selected');
                }
            });
        }

        function renderCustomTags(displayId, items, category) {
            const display = document.getElementById(displayId);
            if (!display) return;
            display.innerHTML = items.map((item, idx) => {
                return `<span class="custom-tag-added">${escapeHTML(item)}<span class="remove-tag" onclick="removeCustomItem('${category}', ${idx})">&times;</span></span>`;
            }).join('');
        }

        function escapeHTML(str) {
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function removeCustomItem(categoryPath, idx) {
            const keys = categoryPath.split('.');
            let obj = appState;
            for (let i = 0; i < keys.length - 1; i++) {
                obj = obj[keys[i]];
            }
            const lastKey = keys[keys.length - 1];
            if (obj && obj[lastKey] && Array.isArray(obj[lastKey].custom)) {
                obj[lastKey].custom.splice(idx, 1);
                saveState();
                syncPage4FromState();
            } else if (obj && Array.isArray(obj[lastKey])) {
                obj[lastKey].splice(idx, 1);
                saveState();
                syncPage4FromState();
            }
        }

        // ==================== 页面4：标签点击事件（事件委托） ====================
        document.addEventListener('click', function(e) {
            const tag = e.target.closest('.tag');
            if (!tag) return;
            const container = tag.parentElement;
            if (!container) return;
            const containerId = container.id;
            const value = tag.getAttribute('data-value');

            if (containerId === 'tag-container-effects-internal') {
                toggleArrayItem(appState.expectedEffects.internal.selected, value);
                saveState();
                syncPage4FromState();
            } else if (containerId === 'tag-container-effects-external') {
                toggleArrayItem(appState.expectedEffects.external.selected, value);
                saveState();
                syncPage4FromState();
            } else if (containerId === 'tag-container-keywords') {
                toggleArrayItem(appState.keywords.selected, value);
                saveState();
                syncPage4FromState();
            } else if (containerId === 'tag-container-storytypes') {
                toggleArrayItem(appState.storyTypes.selected, value);
                saveState();
                syncPage4FromState();
            } else if (containerId === 'tag-container-structures') {
                toggleArrayItem(appState.structures.selected, value);
                saveState();
                syncPage4FromState();
            } else if (containerId === 'tag-container-dataitems') {
                toggleArrayItem(appState.dataItems.selected, value);
                saveState();
                syncPage4FromState();
            } else if (containerId === 'tag-container-narrative') {
                if (appState.narrative.type === value) {
                    appState.narrative.type = "";
                } else {
                    appState.narrative.type = value;
                }
                if (appState.narrative.type) {
                    appState.narrative.customText = "";
                    document.getElementById('input-narrative').value = '';
                }
                saveState();
                syncPage4FromState();
            }
        });

        function toggleArrayItem(arr, value) {
            const idx = arr.indexOf(value);
            if (idx >= 0) {
                arr.splice(idx, 1);
            } else {
                arr.push(value);
            }
        }

        // ==================== 页面4：自定义输入 ====================
        function setupCustomInput(inputId, categoryPath, displayId) {
            const input = document.getElementById(inputId);
            if (!input) return;
            input.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const val = input.value.trim();
                    if (!val) return;
                    const keys = categoryPath.split('.');
                    let obj = appState;
                    for (let i = 0; i < keys.length - 1; i++) {
                        obj = obj[keys[i]];
                    }
                    const lastKey = keys[keys.length - 1];
                    if (obj && obj[lastKey] && Array.isArray(obj[lastKey].custom)) {
                        if (!obj[lastKey].custom.includes(val)) {
                            obj[lastKey].custom.push(val);
                            saveState();
                            syncPage4FromState();
                        }
                    } else if (obj && Array.isArray(obj[lastKey])) {
                        if (!obj[lastKey].includes(val)) {
                            obj[lastKey].push(val);
                            saveState();
                            syncPage4FromState();
                        }
                    }
                    input.value = '';
                }
            });
        }

function downloadMarkdownFile(filename, content) {
    const blob = new Blob([content], { type: 'text/markdown;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
}

        // ==================== Toast ====================
        function showToast(msg) {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2200);
        }

        // ==================== 启动 ====================
        function boot() {
            initApp();
            updatePage2Summary();
            setupCustomInput('input-effects-internal', 'expectedEffects.internal', 'custom-effects-internal-display');
            setupCustomInput('input-effects-external', 'expectedEffects.external', 'custom-effects-external-display');

            setupCustomInput('input-structures', 'structures', 'custom-structures-display');
            setupCustomInput('input-dataitems', 'dataItems', 'custom-dataitems-display');
            setupNarrativeInput();
            setupNotesInput();
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const page1 = document.getElementById('page1');
            if (page1) page1.classList.add('active');
            renderGallery();
            renderPage4Forms();
            syncPage4FromState();

        }
